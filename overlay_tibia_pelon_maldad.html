!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Overlay Tibia Responsive</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    min-width: 100vw;
    min-height: 100vh;
  }

  .overlay {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: transparent;
    overflow: hidden;
  }

  /* Barra superior compacta y responsive */
  .top-zone {
    position: absolute;
    top: 1.2vh;
    left: 2vw;
    right: 2vw;
    height: 13vh;
    min-height: 105px;
    max-height: 180px;
    display: grid;
    grid-template-columns: 1fr 1.25fr 1fr;
    gap: 1.4vw;
    align-items: start;
    pointer-events: none;
  }

  .card {
    height: 100%;
    min-height: 105px;
    max-height: 170px;
    border-radius: 18px;
    background: rgba(5, 5, 10, 0.78);
    border: 2px solid rgba(255,255,255,0.16);
    box-shadow:
      0 0 16px rgba(255, 46, 99, 0.35),
      inset 0 0 14px rgba(255,255,255,0.05);
    overflow: hidden;
    position: relative;
    padding: clamp(9px, 1.3vw, 18px);
  }

  .card::before {
    content: "";
    position: absolute;
    inset: -40%;
    background: conic-gradient(
      from 120deg,
      transparent,
      rgba(255,46,99,.35),
      transparent,
      rgba(0,212,255,.35),
      transparent
    );
    animation: spin 7s linear infinite;
    opacity: .55;
  }

  .card-inner {
    position: absolute;
    inset: 4px;
    border-radius: 15px;
    background: rgba(5, 5, 10, 0.92);
    padding: clamp(8px, 1.2vw, 16px);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .label {
    font-size: clamp(10px, 1.4vw, 18px);
    letter-spacing: 1px;
    color: #cfcfcf;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .title {
    font-size: clamp(18px, 3.5vw, 42px);
    line-height: .95;
    color: white;
    font-weight: 900;
    text-shadow: 0 0 7px rgba(255,255,255,.3);
  }

  .sub {
    margin-top: 6px;
    font-size: clamp(12px, 1.8vw, 24px);
    color: #ffd166;
    font-weight: 900;
  }

  .badge {
    height: clamp(48px, 6.2vh, 78px);
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(255,46,99,.9), rgba(0,212,255,.9));
    padding: 3px;
    box-shadow: 0 0 20px rgba(0,212,255,.35), 0 0 18px rgba(255,46,99,.25);
    align-self: start;
    margin-top: .4vh;
  }

  .badge-inner {
    height: 100%;
    border-radius: 999px;
    background: rgba(5,5,10,.94);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: clamp(18px, 3vw, 38px);
    font-weight: 900;
    letter-spacing: .5px;
    white-space: nowrap;
  }

  .dot {
    width: clamp(10px, 1.5vw, 18px);
    height: clamp(10px, 1.5vw, 18px);
    border-radius: 50%;
    background: #ff2e63;
    box-shadow: 0 0 12px #ff2e63;
    margin-right: 10px;
    animation: pulse 1.25s infinite;
  }

  .right-card {
    box-shadow:
      0 0 16px rgba(0, 212, 255, 0.35),
      inset 0 0 14px rgba(255,255,255,0.05);
  }

  /* Líneas laterales suaves. No tapan el juego. */
  .left-line,
  .right-line {
    position: absolute;
    top: 18vh;
    width: 5px;
    height: 47vh;
    border-radius: 999px;
    background: linear-gradient(to bottom, transparent, #ff2e63, #00d4ff, transparent);
    box-shadow: 0 0 10px rgba(0,212,255,.5);
    opacity: .7;
  }

  .left-line { left: 2.2vw; }
  .right-line { right: 2.2vw; }

  .spark {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px white;
    opacity: .6;
    animation: float 4s ease-in-out infinite;
  }

  .s1 { top: 8vh; left: 36vw; }
  .s2 { top: 12vh; right: 34vw; animation-delay: 1s; }
  .s3 { top: 34vh; left: 3.6vw; animation-delay: 1.8s; }
  .s4 { top: 40vh; right: 3.6vw; animation-delay: 2.5s; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.45); opacity: .55; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); opacity: .25; }
    50% { transform: translateY(-12px); opacity: .9; }
  }

  /* En pantallas/fuentes muy pequeñas, ocultamos la tarjeta derecha para que no se corte */
  @media (max-width: 700px) {
    .top-zone {
      grid-template-columns: 1fr 1.15fr;
    }
    .right-card {
      display: none;
    }
  }
</style>
</head>
<body>
  <div class="overlay">
    <div class="top-zone">
      <div class="card">
        <div class="card-inner">
          <div class="label">TIBIA LIVE</div>
          <div class="title">PELÓN<br>MALDAD</div>
          <div class="sub">EK LVL 744</div>
        </div>
      </div>

      <div class="badge">
        <div class="badge-inner">
          <span class="dot"></span> ROAD TO 750
        </div>
      </div>

      <div class="card right-card">
        <div class="card-inner">
          <div class="label">HUNT MODE</div>
          <div class="title">CRÍTICO<br>IMPARABLE</div>
          <div class="sub">⚔️ EN VIVO</div>
        </div>
      </div>
    </div>

    <div class="left-line"></div>
    <div class="right-line"></div>

    <div class="spark s1"></div>
    <div class="spark s2"></div>
    <div class="spark s3"></div>
    <div class="spark s4"></div>
  </div>
</body>
</html>
