<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Overlay Tibia TikTok - Pelón Maldad</title>
<style>
  :root {
    --bg: rgba(0,0,0,0);
    --panel: rgba(8, 8, 12, 0.72);
    --panel-soft: rgba(18, 18, 26, 0.55);
    --gold: #ffd166;
    --red: #ff2e63;
    --blue: #00d4ff;
    --green: #49ff8f;
    --text: #ffffff;
    --muted: #c9c9c9;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    width: 1080px;
    height: 1920px;
    margin: 0;
    overflow: hidden;
    background: var(--bg);
    font-family: Arial, Helvetica, sans-serif;
  }

  .overlay {
    position: relative;
    width: 1080px;
    height: 1920px;
    background: transparent;
  }

  /* Marco superior para rellenar espacios negros alrededor de la cámara */
  .top-frame {
    position: absolute;
    top: 18px;
    left: 36px;
    right: 36px;
    height: 250px;
    pointer-events: none;
  }

  .top-left-card,
  .top-right-card {
    position: absolute;
    top: 18px;
    width: 315px;
    height: 190px;
    border-radius: 22px;
    background: linear-gradient(145deg, rgba(255,46,99,0.18), rgba(0,212,255,0.12)), var(--panel);
    border: 2px solid rgba(255,255,255,0.18);
    box-shadow: 0 0 22px rgba(255,46,99,0.25), inset 0 0 18px rgba(255,255,255,0.04);
    overflow: hidden;
  }

  .top-left-card {
    left: 0;
  }

  .top-right-card {
    right: 0;
  }

  .card-glow {
    position: absolute;
    inset: -35%;
    background: conic-gradient(from 90deg, transparent, rgba(0,212,255,.35), transparent, rgba(255,46,99,.35), transparent);
    animation: spin 6s linear infinite;
    opacity: .55;
  }

  .card-content {
    position: absolute;
    inset: 5px;
    border-radius: 18px;
    background: rgba(8, 8, 12, 0.86);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 22px;
  }

  .small-label {
    color: var(--muted);
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .main-title {
    color: var(--text);
    font-size: 39px;
    font-weight: 900;
    line-height: 1;
    text-shadow: 0 0 10px rgba(255,255,255,0.25);
  }

  .sub-title {
    margin-top: 10px;
    color: var(--gold);
    font-size: 25px;
    font-weight: 800;
  }

  .center-badge {
    position: absolute;
    top: 15px;
    left: 50%;
    width: 355px;
    height: 70px;
    transform: translateX(-50%);
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(255,46,99,0.85), rgba(0,212,255,0.85));
    padding: 3px;
    box-shadow: 0 0 30px rgba(0,212,255,0.25), 0 0 30px rgba(255,46,99,0.22);
  }

  .center-badge-inner {
    width: 100%;
    height: 100%;
    border-radius: 999px;
    background: rgba(5, 5, 9, 0.9);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 1px;
  }

  .live-dot {
    width: 14px;
    height: 14px;
    background: #ff2e63;
    border-radius: 50%;
    margin-right: 12px;
    box-shadow: 0 0 14px #ff2e63;
    animation: pulse 1.3s infinite;
  }

  /* Líneas decorativas laterales */
  .side-line-left,
  .side-line-right {
    position: absolute;
    top: 285px;
    width: 7px;
    height: 820px;
    border-radius: 999px;
    background: linear-gradient(to bottom, transparent, rgba(255,46,99,0.8), rgba(0,212,255,0.8), transparent);
    opacity: .9;
    box-shadow: 0 0 18px rgba(0,212,255,.35);
  }

  .side-line-left {
    left: 20px;
  }

  .side-line-right {
    right: 20px;
  }

  /* Barra inferior opcional para colocar sobre espacios negros o debajo del gameplay */
  .bottom-strip {
    position: absolute;
    left: 36px;
    right: 36px;
    bottom: 30px;
    height: 110px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(255,46,99,0.14), rgba(0,212,255,0.12)), rgba(8,8,12,.72);
    border: 2px solid rgba(255,255,255,.14);
    display: flex;
    align-items: center;
    justify-content: space-around;
    color: #fff;
    box-shadow: 0 0 24px rgba(0,0,0,.35);
  }

  .stat {
    text-align: center;
    min-width: 210px;
  }

  .stat .label {
    font-size: 20px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat .value {
    margin-top: 4px;
    font-size: 32px;
    font-weight: 900;
  }

  .value.gold { color: var(--gold); }
  .value.green { color: var(--green); }
  .value.blue { color: var(--blue); }
  .value.red { color: var(--red); }

  /* Pequeños brillos animados */
  .spark {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
    opacity: .65;
    box-shadow: 0 0 14px #fff;
    animation: float 4s ease-in-out infinite;
  }

  .s1 { top: 120px; left: 430px; animation-delay: .2s; }
  .s2 { top: 190px; right: 420px; animation-delay: 1s; }
  .s3 { top: 1020px; left: 38px; animation-delay: 1.7s; }
  .s4 { top: 880px; right: 42px; animation-delay: 2.3s; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.45); opacity: .55; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); opacity: .25; }
    50% { transform: translateY(-16px); opacity: .9; }
  }
</style>
</head>
<body>
  <div class="overlay">

    <div class="top-frame">
      <div class="top-left-card">
        <div class="card-glow"></div>
        <div class="card-content">
          <div class="small-label">Tibia LIVE</div>
          <div class="main-title">PELÓN<br>MALDAD</div>
          <div class="sub-title">EK LVL 744</div>
        </div>
      </div>

      <div class="center-badge">
        <div class="center-badge-inner">
          <span class="live-dot"></span> ROAD TO 750
        </div>
      </div>

      <div class="top-right-card">
        <div class="card-glow"></div>
        <div class="card-content">
          <div class="small-label">Hunt Mode</div>
          <div class="main-title">CRÍTICO<br>IMPARABLE</div>
          <div class="sub-title">⚔️ Follow para más</div>
        </div>
      </div>
    </div>

    <div class="side-line-left"></div>
    <div class="side-line-right"></div>

    <div class="spark s1"></div>
    <div class="spark s2"></div>
    <div class="spark s3"></div>
    <div class="spark s4"></div>

    <div class="bottom-strip">
      <div class="stat">
        <div class="label">Level</div>
        <div class="value gold">744</div>
      </div>
      <div class="stat">
        <div class="label">Meta</div>
        <div class="value green">750</div>
      </div>
      <div class="stat">
        <div class="label">Server</div>
        <div class="value blue">Tibia</div>
      </div>
      <div class="stat">
        <div class="label">Modo</div>
        <div class="value red">LIVE</div>
      </div>
    </div>

  </div>
</body>
</html>
